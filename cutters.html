          <p class="card__text">High-precision annular and profile cutters for both

            reliable cutting across a wide range of pipe diameters and wall thicknesses.</p>
          <p class="card__text">We supply two cutter families: <strong>angle milling
            cutters</strong> for pipe cold cutting &amp; beveling machines, and
            <strong>annular cutters</strong> for hot tapping &amp; line isolation
            equipment.</p>

        </div>
